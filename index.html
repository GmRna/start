<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>럭셔리 별점 & 한줄평 시스템</title>
    <style>
        /* 화려한 그라데이션 및 애니메이션 배경 */
        body {
            margin: 0;
            padding: 20px;
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: linear-gradient(-45deg, #6366f1, #a855f7, #ec4899, #f43f5e);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: white;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* 유리 효과 컨테이너 */
        .container {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 24px;
            padding: 35px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.2);
            text-align: center;
            margin-bottom: 25px;
        }

        h1 { font-size: 1rem; font-weight: 300; letter-spacing: 2px; margin-bottom: 5px; opacity: 0.9; }

        .average-section {
            font-size: 4rem;
            font-weight: 800;
            margin: 10px 0;
            color: #fff;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.4);
        }

        /* 별점 스타일링 */
        .star-rating {
            display: flex;
            flex-direction: row-reverse;
            justify-content: center;
            font-size: 2.8rem;
            margin-bottom: 20px;
        }
        .star-rating input { display: none; }
        .star-rating label {
            cursor: pointer;
            color: rgba(255, 255, 255, 0.2);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .star-rating label:hover,
        .star-rating label:hover ~ label,
        .star-rating input:checked ~ label {
            color: #ffd700;
            text-shadow: 0 0 15px rgba(255, 215, 0, 0.6);
            transform: scale(1.15);
        }

        /* 입력창 디자인 */
        .comment-input {
            width: 100%;
            box-sizing: border-box;
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            outline: none;
            background: rgba(255, 255, 255, 0.15);
            color: white;
            font-size: 1rem;
            margin-bottom: 20px;
            transition: 0.3s;
        }
        .comment-input::placeholder { color: rgba(255, 255, 255, 0.5); }
        .comment-input:focus { background: rgba(255, 255, 255, 0.25); border-color: #fff; }

        /* 저장 버튼 */
        .save-btn {
            background: #fff;
            color: #6366f1;
            border: none;
            padding: 15px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .save-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
            background: #ffd700;
            color: #333;
        }

        /* 리스트 스타일 */
        .list-container {
            width: 100%;
            max-width: 420px;
        }
        .review-item {
            background: rgba(255, 255, 255, 0.12);
            margin-bottom: 12px;
            padding: 18px;
            border-radius: 16px;
            display: flex;
            align-items: center;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            animation: fadeInUp 0.5s ease backwards;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .review-stars {
            color: #ffd700;
            font-weight: bold;
            font-size: 1.1rem;
            margin-right: 15px;
            white-space: nowrap;
        }
        .review-text {
            font-size: 0.95rem;
            line-height: 1.4;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>AVERAGE RATING</h1>
        <div class="average-section" id="avg-display">0.0</div>
        
        <div class="star-rating">
            <input type="radio" name="stars" id="star5" value="5"><label for="star5">★</label>
            <input type="radio" name="stars" id="star4" value="4"><label for="star4">★</label>
            <input type="radio" name="stars" id="star3" value="3"><label for="star3">★</label>
            <input type="radio" name="stars" id="star2" value="2"><label for="star2">★</label>
            <input type="radio" name="stars" id="star1" value="1"><label for="star1">★</label>
        </div>

        <input type="text" id="comment" class="comment-input" placeholder="한줄평을 남겨주세요 (15자)" maxlength="15">
        <button class="save-btn" onclick="addReview()">리뷰 저장하기</button>
    </div>

    <div class="list-container" id="review-list">
        </div>

    <script>
        // 1. 로컬 스토리지에서 데이터 불러오기
        let reviews = JSON.parse(localStorage.getItem('luxury_reviews')) || [];

        // 초기 실행
        updateUI();

        function addReview() {
            const starElement = document.querySelector('input[name="stars"]:checked');
            const commentElement = document.getElementById('comment');
            
            // 유효성 검사
            if (!starElement) {
                alert("별점을 선택해주세요!");
                return;
            }
            if (!commentElement.value.trim()) {
                alert("한줄평을 입력해주세요!");
                return;
            }

            // 데이터 객체 생성
            const newReview = {
                id: Date.now(), // 고유 ID (삭제 기능 대비)
                score: parseInt(starElement.value),
                text: commentElement.value
            };

            // 배열 처음에 추가 (최신순)
            reviews.unshift(newReview);

            // 2. 로컬 스토리지 업데이트
            localStorage.setItem('luxury_reviews', JSON.stringify(reviews));

            // UI 갱신
            updateUI();

            // 입력 필드 초기화
            starElement.checked = false;
            commentElement.value = "";
        }

        function updateUI() {
            const avgDisplay = document.getElementById('avg-display');
            const listContainer = document.getElementById('review-list');

            // 평균 계산
            if (reviews.length > 0) {
                const sum = reviews.reduce((a, b) => a + b.score, 0);
                avgDisplay.innerText = (sum / reviews.length).toFixed(1);
            } else {
                avgDisplay.innerText = "0.0";
            }

            // 리스트 렌더링 (보안 강화: textContent 사용)
            listContainer.innerHTML = ""; 
            
            reviews.forEach(r => {
                const item = document.createElement('div');
                item.className = 'review-item';
                
                const starSpan = document.createElement('span');
                starSpan.className = 'review-stars';
                starSpan.textContent = `★ ${r.score}`;

                const textSpan = document.createElement('span');
                textSpan.className = 'review-text';
                textSpan.textContent = r.text; // XSS 방지

                item.appendChild(starSpan);
                item.appendChild(textSpan);
                listContainer.appendChild(item);
            });
        }
    </script>
</body>
</html>
